name: Try Create Oracle VM

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🛠️ 1. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🛠️ 2. 全強置跨任務快取資料夾（避開任何專案設定檔檢查）
      - name: Cache OCI Packages
        id: oci-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-oci-v2

      # 🛠️ 3. 智慧型安裝：若快取存在則 1 秒直接還原；若無快取則自動線上下載
      - name: Install OCI CLI
        run: |
          if [ "${{ steps:oci-cache.outputs.cache-hit }}" = "true" ]; then
            echo "🎯 檢測到本地快取，正在進行秒級極速還原..."
            pip install oci-cli --no-index --find-links ~/.cache/pip --quiet
          else
            echo "📥 首次執行，正在從網路下載並建立快取庫..."
            pip install oci-cli --cache-dir ~/.cache/pip --quiet
          fi

      # 💡 以下所有核心程式碼與變數「完全無變動」
      - name: Setup OCI CLI config
        env:
          OCI_API_PRIVATE_KEY: ${{ secrets.OCI_API_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_API_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Try create VM
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash scripts/create_vm.sh

      - name: Commit retry state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state/
          if ! git diff --cached --quiet; then
            git commit -m "更新搶建 VM 累計狀態 [skip ci]"
            git pull --rebase
            git push
          else
            echo "狀態無變化"
          fi
