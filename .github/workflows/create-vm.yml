name: Try Create Oracle VM

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🛠️ 專用加速安裝：直接使用官方推薦的 OCI Actions，免裝 Python、免算快取
      # 內部使用預編譯好的環境，秒速架設好 OCI 命令列環境
      - name: Install OCI CLI
        uses: oracle-actions/setup-oci@v1
        with:
          allow_node_deprecation_warning: true

      - name: Setup OCI CLI config
        env:
          OCI_API_PRIVATE_KEY: ${{ secrets.OCI_API_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_API_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Try create VM
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash scripts/create_vm.sh

      - name: Commit retry state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add -A state/
          if ! git diff --cached --quiet; then
            git commit -m "更新搶建 VM 累計狀態 [skip ci]"
            git pull --rebase
            git push
          else
            echo "狀態無變化 nudge"
          fi
