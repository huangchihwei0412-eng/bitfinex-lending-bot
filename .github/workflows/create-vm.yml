name: Try Create Oracle VM

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🛠️ 1. 設定 Python 環境（不帶快取參數，避免檢查專案檔案）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🛠️ 2. 強制鎖定本地資料夾做為快取庫，用固定名稱（v3）避開 requirements.txt 檢查
      - name: Cache OCI CLI Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-oci-cli-v3

      # 🛠️ 3. 正常安裝：有快取時自動讀快取（2秒），沒快取時自動網路下載（20秒）
      - name: Install OCI CLI
        run: |
          python3 -m pip install --user oci-cli --cache-dir ~/.cache/pip --no-warn-script-location --quiet

      # 💡 以下核心程式碼「完全一字未改」，確保核心功能不受影響
      - name: Setup OCI CLI config
        env:
          OCI_API_PRIVATE_KEY: ${{ secrets.OCI_API_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_API_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Try create VM
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash scripts/create_vm.sh

      - name: Commit retry state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state/
          if ! git diff --cached --quiet; then
            git commit -m "更新搶建 VM 累計狀態 [skip ci]"
            git pull --rebase
            git push
          else
            echo "狀態無變化"
          fi
